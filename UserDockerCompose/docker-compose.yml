services:
  auth-service:
    image: mortenstaunstrup/authservice-image:0.1.1
    environment:
      - VAULT_ENDPOINT=https://vault:8201/
    expose:
      - "8080"
    networks:
      - haavuser
      - external-backend
    
  user-service:
    image: mortenstaunstrup/userservice-image:42.0.0
    environment:
      - MONGO_CONNECTION_STRING=mongodb://admin:secret123@mongodb:27017/?authSource=admin
      - MONGO_DATABASE_NAME=UserDb
      - VAULT_ENDPOINT=https://vault:8201/
      - AUTHSERVICE_ULR=http://nginx:4000/authservices/
    expose:
      - "8080"
    networks:
      - haavuser
      - external-backend
  
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - auth-service
    ports:
      - "4000:4000"
    networks:
      - haavuser

networks:
  haavuser:
  external-backend:
    external: true

  ## nginx goes here, sammen med config filen