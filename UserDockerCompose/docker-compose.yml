services:
  auth-service:
    image: auth-service:0.1.0
    environment:
      - VAULT_URL=https://localhost:8201/
    expose:
      - "8080"
    networks:
      - haavops
    
  user-service:
    image: 
    expose:
      - "8080"
    networks:
      - haavuser
  
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - catalog-service
      - order-service
    ports:
      - "4000:4000"
    networks:
      - haavuser

networks:
  haavuser

